    description_pt: |
      Roteador com fallback em três camadas (subscription → cheap → free)
      com RTK reduzindo tokens em ~40%.
    highlights:
      - 3-tier strategy
      - ~40% token reduction via RTK
      - Optimizes cost across plan types

