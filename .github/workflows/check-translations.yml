name: Check Translations Sync

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - '.github/i18n/**'
      - 'scripts/i18n/**'
  pull_request:
    paths:
      - 'README.md'
      - '.github/i18n/**'
      - 'scripts/i18n/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install 'python-dotenv==1.0.1' 'pytest==8.3.3'

      - name: Run unit tests
        run: python -m pytest scripts/i18n/test_translate_readme.py -v

      - name: Verify translations are in sync
        run: python scripts/i18n/translate_readme.py --check
