name: Weekly Update & Validation

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: ./scripts/merge.sh
      - run: python scripts/validate.py
      - run: python scripts/render_readme.py

      - name: Verify endpoints (weekly only)
        if: github.event_name == 'schedule'
        run: python scripts/verify_endpoints.py

      - name: Commit changes
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/verified.json data/hub.yaml
          git diff --staged --quiet || git commit -m "chore: weekly auto-update"
          git push
